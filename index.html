<!DOCTYPE html><!--[if lt IE 7]> <html lang="en" class="no-js ie6"> <![endif]--><!--[if IE 7]>    <html lang="en" class="no-js ie7"> <![endif]--><!--[if IE 8]>    <html lang="en" class="no-js ie8"> <![endif]--><!--[if gt IE 8]><!--><html class="no-js" lang="en"><!--<![endif]--><head>
		<meta charset="utf-8">
		<meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
		<title>ProtechWeb </title>	
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
		<link rel="stylesheet" href="css/maximage.css" type="text/css" media="screen" charset="utf-8">
		<link rel="stylesheet" href="css/styles.css" type="text/css" media="screen" charset="utf-8">
	</head>
	<body>


		<!-- Switch to full screen -->
		<button class="full-screen" onclick="$(document).toggleFullScreen()"></button>

		<!-- Site Logo -->
		<div id="logo" >30/05/2026</div>

		<!-- Home Page -->
		<section class="content show" id="home">
			<h1>Coming soon</h1>
			<h5>ProTechweb.io.vn đã hoặc tạm thời ngừng hoạt động!</h5>
			<p>Kể Từ 9:00 Ngày 30/5/2026, ProTechweb.io.vn sẽ ngừng hoạt động!.</p>
			<p>Theo dõi thêm tại Facebook <a target="_blank" rel="nofollow, noindex" href="https://www.facebook.com/profile.php?id=61588580439353"><b>Fanpage chính thức</b></a></p>
		</section>

		<div id="countdown-widget" style="font-family:sans-serif;text-align:center;padding:20px;background:#1a1a2e;color:white;border-radius:10px;">
  			<h3 style="margin-bottom:15px;">Good bye</h3>
  			<div style="display:flex;justify-content:center;gap:15px;">
    			<div><span id="cd-days" style="font-size:2em;font-weight:bold;">00</span><br><small>Ngày</small></div>
    			<div><span id="cd-hours" style="font-size:2em;font-weight:bold;">00</span><br><small>Giờ</small></div>
    			<div><span id="cd-mins" style="font-size:2em;font-weight:bold;">00</span><br><small>Phút</small></div>
    			<div><span id="cd-secs" style="font-size:2em;font-weight:bold;">00</span><br><small>Giây</small></div>
  			</div>
		</div>
		<script>
		(function(){var t=new Date("2026-05-30T21:00").getTime();setInterval(function(){var n=new Date().getTime(),d=t-n;if(d<0)return;document.getElementById("cd-days").innerHTML=Math.floor(d/864e5);document.getElementById("cd-hours").innerHTML=Math.floor(d%864e5/36e5);document.getElementById("cd-mins").innerHTML=Math.floor(d%36e5/6e4);document.getElementById("cd-secs").innerHTML=Math.floor(d%6e4/1e3);},1e3);})();
		</script>

		
		<!-- Background Slides -->
		<div id="maximage">
			<div>
				<img src="images/3.png" alt="">
				<img class="gradient" src="images/gradient.png" alt="">
			</div>
			
			<div>
				<img src="images/2.jpg" alt="">
				<img class="gradient" src="images/gradient.png" alt="">
			</div>

			<div>
				<img src="images/1.jpg" alt="">
				<img class="gradient" src="images/gradient.png" alt="">
			</div>

			<div>
				<img src="images/4.png" alt="">
				<img class="gradient" src="images/gradient.png" alt="">
			</div>
		</div>
		
		<script src="js/jquery.js"></script>
		<script src="js/jquery.easing.min.js" type="text/javascript" charset="utf-8"></script>
		<script src="js/jquery.cycle.all.js" type="text/javascript" charset="utf-8"></script>
		<script src="js/jquery.maximage.js" type="text/javascript" charset="utf-8"></script>
		<script src="js/jquery.fullscreen.js" type="text/javascript" charset="utf-8"></script>
		<script src="js/jquery.ba-hashchange.js" type="text/javascript" charset="utf-8"></script>
		<script src="js/main.js" type="text/javascript" charset="utf-8"></script>
		
		<script type="text/javascript" charset="utf-8">
			$(function(){
				$('#maximage').maximage({
					cycleOptions: {
						fx: 'fade',
						speed: 1000, // Has to match the speed for CSS transitions in jQuery.maximage.css (lines 30 - 33)
						timeout: 5000,
						prev: '#arrow_left',
						next: '#arrow_right',
						pause: 0,
						before: function(last,current){
							if(!$.browser.msie){
								// Start HTML5 video when you arrive
								if($(current).find('video').length > 0) $(current).find('video')[0].play();
							}
						},
						after: function(last,current){
							if(!$.browser.msie){
								// Pauses HTML5 video when you leave it
								if($(last).find('video').length > 0) $(last).find('video')[0].pause();
							}
						}
					},
					onFirstImageLoaded: function(){
						jQuery('#cycle-loader').hide();
						jQuery('#maximage').fadeIn('fast');
					}
				});
	
				// Helper function to Fill and Center the HTML5 Video
				jQuery('video,object').maximage('maxcover');
	
			});
		</script>
  

</body></html>
